<!doctype html>
<html lang="uz">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kinoni tomosha qiling</title>
    <style>
      body,
      html {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
        background-color: #ffffff;
        overflow: hidden;
      }

      #video-container {
        width: 95%;
        max-width: 1000px;
        height: 56.25vw;
        max-height: 80vh;
        background: #000;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        border-radius: 12px;
        overflow: hidden;
      }

      iframe {
        width: 100%;
        height: 100%;
        border: none;
      }

      .error-msg {
        font-family: sans-serif;
        color: #333;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div id="video-container"></div>

    <script>
      const urlParams = new URLSearchParams(window.location.search);
      const videoId = urlParams.get("id");

      const container = document.getElementById("video-container");

      if (videoId) {
        container.innerHTML = `
                <iframe
                    src="https://drive.google.com/file/d/${videoId}/preview"
                    allow="autoplay; encrypted-media"
                    allowfullscreen>
                </iframe>
            `;
      } else {
        container.style.background = "transparent";
        container.style.boxShadow = "none";
        container.innerHTML =
          "<h2 class='error-msg'>❌ Video ID'si topilmadi!</h2>";
      }
    </script>
  </body>
</html>
